<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Classic Pong arcade game" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>PONG</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      touch-action: none;
    }

    #game-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #canvas {
      display: block;
      border: 2px solid #fff;
      image-rendering: pixelated;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.6);
    }

    #modal {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: clamp(24px, 5vw, 40px) clamp(28px, 6vw, 48px);
      background: #111;
      border: 2px solid #fff;
      color: #fff;
      text-align: center;
      width: min(340px, 80%);
    }

    #theme-options {
      display: flex;
      flex-direction: row;
      gap: 8px;
      width: 100%;
    }

    .theme-btn {
      flex: 1;
      padding: 8px 4px;
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.35);
      font-family: 'Courier New', monospace;
      font-size: clamp(0.55rem, 1.8vw, 0.7rem);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .theme-btn:hover, .theme-btn:focus {
      border-color: #fff;
      outline: none;
    }

    .theme-btn.active {
      background: #fff;
      color: #000;
      border-color: #fff;
    }

    #theme-label {
      font-size: clamp(0.5rem, 1.5vw, 0.62rem);
      letter-spacing: 0.12em;
      opacity: 0.35;
      text-transform: uppercase;
      align-self: flex-start;
    }

    #modal h1 {
      font-size: clamp(2rem, 8vw, 3rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
    }

    #modal hr {
      width: 100%;
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
    }

    #start-btn {
      padding: 12px 32px;
      background: transparent;
      color: #fff;
      border: 2px solid #fff;
      font-family: 'Courier New', monospace;
      font-size: clamp(0.75rem, 2.5vw, 1rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    #start-btn:hover, #start-btn:focus {
      background: #fff;
      color: #000;
      outline: none;
    }

    #menu-rules {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: clamp(0.65rem, 2vw, 0.8rem);
      letter-spacing: 0.1em;
      opacity: 0.65;
      line-height: 1.6;
      text-align: center;
    }

    #menu-rules .rule-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    #menu-rules .dot {
      width: 4px;
      height: 4px;
      background: #fff;
      border-radius: 50%;
      flex-shrink: 0;
      opacity: 0.5;
    }

    #menu-controls {
      font-size: clamp(0.55rem, 1.6vw, 0.68rem);
      letter-spacing: 0.08em;
      opacity: 0.3;
      line-height: 2;
      text-align: center;
    }

    #pause-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 36px;
      height: 36px;
      background: transparent;
      border: 2px solid rgba(255,255,255,0.4);
      color: #fff;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s;
    }

    #pause-btn.visible {
      display: flex;
    }

    #pause-btn:hover, #pause-btn:focus {
      border-color: #fff;
      outline: none;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="canvas"></canvas>
    <button id="pause-btn" aria-label="Pause">&#9646;&#9646;</button>
    <div id="overlay">
      <div id="modal">
        <h1>PONG</h1>
        <hr />
        <div id="menu-rules">
          <div class="rule-row"><span class="dot"></span>YOU VS CPU<span class="dot"></span></div>
          <div class="rule-row">BOUNCE THE BALL PAST YOUR OPPONENT</div>
          <div class="rule-row">FIRST TO 9 POINTS WINS</div>
          <div class="rule-row">BALL SPEEDS UP WITH EACH HIT</div>
        </div>
        <span id="theme-label">THEME</span>
        <div id="theme-options">
          <button class="theme-btn active" data-theme="classic">CLASSIC</button>
          <button class="theme-btn" data-theme="hockey">HOCKEY</button>
        </div>
        <button id="start-btn">INSERT COIN</button>
        <div id="menu-controls">
          ← / → &nbsp; OR &nbsp; A / D &nbsp;&nbsp;·&nbsp;&nbsp; TOUCH: DRAG PADDLE
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
  <script>
    document.querySelectorAll('.theme-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        window.setTheme(btn.dataset.theme);
      });
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
</body>
</html>
